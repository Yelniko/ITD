services:
  db:
    image: postgres:16
    container_name: odoo_db

    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo

    volumes:
      - ./postgres:/var/lib/postgresql/data

    restart: always

  odoo:
    image: odoo:19.0
    container_name: odoo_web
    build: .

    depends_on:
      - db

    ports:
      - "8069:8069"

    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo

    volumes:
      - ./custom_addons:/mnt/extra-addons
      - ./config:/etc/odoo
      - ./logs:/var/log/odoo

    restart: always
